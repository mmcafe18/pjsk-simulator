<!DOCTYPE html>

            <!-- 設定パネルエリア -->
            <section class="settings">
                <div class="settings-div">
                    <h2 class="card-settings-title">カード詳細設定</h2>
                    <div class="settings-reset">
                        <input type="button" class="reset" id="reset-button" value="リセット">
                    </div>
                </div>


                <div class="settings-icon-power-div">
                    <div class="settings-icon" id="setting-icon"></div>
                    <div class="settings-power-detail">
                        <div class="power-pf">
                            <h3>パフォーマンス</h3>
                            <h3 class="power-text" id="param1"></h3>
                        </div>
                        <div class="power-te">
                            <h3>テクニック</h3>
                            <h3 class="power-text" id="param2"></h3>
                        </div>
                        <div class="power-st">
                            <h3>スタミナ</h3>
                            <h3 class="power-text" id="param3"></h3>
                        </div>
                    </div>
                    <div class="settings-story">
                        <div class="story-text1">
                            <h3>サイドストーリー</h3>
                        </div>
                        <div class="story-text2">
                            <h3>解放状況</h3>
                        </div>
                        <div class="story-text-btn">
                            <input type="button" class="story" id="story-part1" value="前編" data-story="false">
                            <input type="button" class="story" id="story-part2" value="後編" data-story="false">
                        </div>
                    </div>
                    <div class="settings-canvas">
                        <div class="canvas-text1">
                            <h3>キャンバス</h3>
                        </div>
                        <div class="canvas-text2">
                            <h3>製作状況</h3>
                        </div>
                        <div class="canvas-text-btn">
                            <input type="button" class="canvas" id="canvas" value="製作済み" data-canvas="false">
                        </div>
                    </div>
                </div>

                <div class="settings-status-div">
                    <div class="settings-level">
                        <div class="level-text">
                            <h3>レベル：</h3>
                            <h3 id="lv-text">1</h3>
                        </div>
                        <div class="level-slider">
                            <span class="slider-min">1</span>
                            <input type="range" class="level" id="level_slider" min="1" max="20" value="1">
                            <span class="slider-max" id="level_slider_max">20</span>
                        </div>
                    </div>
                    <div class="settings-training">
                        <div class="training-text">
                            <h3>特訓</h3>
                        </div>
                        <div class="training-text-btn">
                            <input type="button" class="training" value="特訓済み" data-training="false">
                        </div>
                    </div>
                    <div class="settings-master">
                        <div class="master-text">
                            <h3>マスラン：</h3>
                            <h3 id="master-text">0</h3>
                        </div>
                        <div class="master-slider">
                            <span class="slider-min">0</span>
                            <input type="range" class="master" id="master_slider" min="0" max="5" value="0">
                            <span class="slider-max">5</span>
                        </div>
                    </div>
                    <div class="settings-skill">
                        <div class="skill-text">
                            <h3>スキル：</h3>
                            <h3 id="skill-text">1</h3>
                        </div>
                        <div class="skill-slider">
                            <span class="slider-min">1</span>
                            <input type="range" class="skill" min="1" max="4" value="1">
                            <span class="slider-max">4</span>
                        </div>
                    </div>
                </div>


            </section>
        </div>

        <!-- カードリストエリア -->
        <section class="cards-list">
            <div class="cards-filter-div">
                <div class="cards-filter-length">
                    <p class="cards-length-text">全 0 枚</p>
                </div>
                <div class="cards-filter-button">
                    <input type="button" class="filter" id="filter-button" value="☰ 絞り込む">
                </div>
            </div>
            <div class="cards"></div>

        </section>

        <dialog class="resetDialog">
            <p>このカードの設定をリセットしますか？</p>

            <div class="reset-dialog-buttons">
                <button id="reset-dialog-cancel">キャンセル</button>
                <button id="reset-dialog-ok">OK</button>
            </div>
        </dialog>

        <dialog class="filterDialog">
            <div class="filter-dialog-main">
                <div class="filter-dialog-unit">
                    <h4 class="filter-dialog-text">ユニット</h4>
                    <div class="filter-dialog-unit-div"></div>
                </div>
                <div class="filter-dialog-member">
                    <h4 class="filter-dialog-text">メンバー</h4>
                    <div class="filter-dialog-member-div"></div>
                </div>
                <div class="filter-dialog-rarity">
                    <h4 class="filter-dialog-text">レアリティ</h4>
                    <div class="filter-dialog-rarity-div"></div>
                </div>
                <div class="filter-dialog-type">
                    <h4 class="filter-dialog-text">タイプ</h4>
                    <div class="filter-dialog-type-div"></div>
                </div>
            </div>

            <div class="filter-dialog-buttons">

            </div>
        </dialog>
